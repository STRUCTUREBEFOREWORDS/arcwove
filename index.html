    <script>
      (function () {
        const redirect = new URL(window.location.href)
        const route = redirect.searchParams.get('p')

        if (!route) {
          return
        }

        const decodedPath = route.replace(/~and~/g, '&')
        const normalizedPath = decodedPath.startsWith('/') ? decodedPath : '/' + decodedPath
        const query = redirect.searchParams.get('q')
        const hash = redirect.hash || ''
        const nextUrl =
          redirect.pathname +
          '#' +
          normalizedPath +
          (query ? '?' + query : '') +
          hash

        window.history.replaceState(null, '', nextUrl)
      })()
    </script>
